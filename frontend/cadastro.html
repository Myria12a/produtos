<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Produto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Cadastro de Produto</h1>
    <form id="formProduto">
        <input type="text" placeholder="Nome" id="nome" required>
        <input type="number" step="0.01" placeholder="Preço" id="preco" required>
        <button type="submit">Cadastrar</button>
    </form>
    <p id="resposta"></p>

    <script>
        const form = document.getElementById('formProduto');
        const resposta = document.getElementById('resposta');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('nome').value;
            const preco = document.getElementById('preco').value;

            const res = await fetch('http://localhost:3000/produtos/cadastrar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, preco })
            });

            const data = await res.json();
            resposta.innerText = data.message;
            form.reset();
        });
    </script>
</body>
</html>
