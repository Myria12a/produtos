<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Produto</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1 id="titulo-form">Cadastrar Produto</h1>
      <p class="sub">Preencha os dados do produto.</p>

      <div id="mensagem" class="mensagem hidden"></div>

      <form id="form-produto">
        <input type="hidden" id="produto-id" />

        <label for="name">Nome</label>
        <input id="name" type="text" maxlength="255" required />

        <label for="price">Preço</label>
        <input id="price" type="number" step="0.01" min="0" max="999999.99" required />

        <label for="category">Categoria</label>
        <input id="category" type="text" maxlength="100" required />

        <label for="description">Descrição</label>
        <textarea id="description" rows="4" maxlength="5000"></textarea>

        <button class="btn btn-primary" type="submit" id="btn-salvar">Salvar Produto</button>
      </form>

      <div class="actions top-gap">
        <a class="btn btn-secondary" href="produtos.html">Ir para lista de produtos</a>
        <a class="btn btn-ghost" href="index.html">Voltar ao início</a>
      </div>
    </section>
  </main>

  <script src="script-cadastro.js"></script>
</body>
</html>
